name: Screenshot

on:
  push:
    branches: [main, feat/virtual-display-screenshot]
  workflow_dispatch:

jobs:
  screenshot:
    runs-on: macos-26

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Swift
        uses: swift-actions/setup-swift@v2
        with:
          swift-version: "6.2"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - name: Create Virtual HiDPI Display
        run: |
          # Compile the virtual display tool
          swiftc Scripts/create_virtual_display.swift -o virtual-display

          # Run in background, capture PID
          # The tool outputs display ID to stdout, status to stderr
          ./virtual-display > display_id.txt 2> display.log &
          echo $! > display_pid.txt

          # Wait for display to initialize
          sleep 3

          # Show logs
          cat display.log || true

          # Extract display ID (it's the last line that's just a number)
          if [ -s display_id.txt ]; then
            DISPLAY_ID=$(grep -E '^[0-9]+$' display_id.txt | tail -1 || true)
            if [ -n "$DISPLAY_ID" ]; then
              echo "Virtual display created with ID: $DISPLAY_ID"
              echo "$DISPLAY_ID" > display_id_clean.txt
              system_profiler SPDisplaysDataType || true
            else
              echo "Warning: Could not parse display ID from output:"
              cat display_id.txt
            fi
          else
            echo "Warning: Virtual display may not have initialized properly"
            cat display.log || true
          fi

      - name: Build and Take High-Res Screenshot
        run: |
          # Use virtual display if available
          if [ -f display_id_clean.txt ]; then
            DISPLAY_ID=$(cat display_id_clean.txt)
            echo "Using virtual display: $DISPLAY_ID"
            make screenshot-hires-display DISPLAY_ID="$DISPLAY_ID"
          else
            echo "No virtual display, using default screenshot method"
            make screenshot-hires
          fi

      - name: Generate Icon PNG
        run: |
          # Create iconset from source images and compile to .icns
          mkdir -p AppIcon.iconset
          # Use the highest resolution source image for all sizes
          sips -z 1024 1024 "AppIcon.icon/Assets/Image 3.png" --out AppIcon.iconset/icon_512x512@2x.png
          sips -z 512 512 "AppIcon.icon/Assets/Image 3.png" --out AppIcon.iconset/icon_512x512.png
          sips -z 512 512 "AppIcon.icon/Assets/Image 3.png" --out AppIcon.iconset/icon_256x256@2x.png
          sips -z 256 256 "AppIcon.icon/Assets/Image 3.png" --out AppIcon.iconset/icon_256x256.png
          sips -z 256 256 "AppIcon.icon/Assets/Image 3.png" --out AppIcon.iconset/icon_128x128@2x.png
          sips -z 128 128 "AppIcon.icon/Assets/Image 3.png" --out AppIcon.iconset/icon_128x128.png
          sips -z 64 64 "AppIcon.icon/Assets/Image 3.png" --out AppIcon.iconset/icon_32x32@2x.png
          sips -z 32 32 "AppIcon.icon/Assets/Image 3.png" --out AppIcon.iconset/icon_32x32.png
          sips -z 32 32 "AppIcon.icon/Assets/Image 3.png" --out AppIcon.iconset/icon_16x16@2x.png
          sips -z 16 16 "AppIcon.icon/Assets/Image 3.png" --out AppIcon.iconset/icon_16x16.png
          # Compile to .icns
          iconutil -c icns AppIcon.iconset -o AppIcon.icns
          # Extract PNG from compiled icon
          sips -s format png AppIcon.icns --out icon.png
          ls -lh screenshot.png icon.png

      - name: Upload Screenshot Artifact
        uses: actions/upload-artifact@v4
        with:
          name: assets
          path: |
            screenshot.png
            icon.png

      - name: Deploy to gh-pages
        if: github.ref == 'refs/heads/main'
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          git fetch origin gh-pages || true
          rm -rf /tmp/gh-pages
          if git show-ref --verify --quiet refs/remotes/origin/gh-pages; then
            git worktree add /tmp/gh-pages gh-pages
            cd /tmp/gh-pages
            git pull origin gh-pages || true
          else
            git worktree add --detach /tmp/gh-pages
            cd /tmp/gh-pages
            git checkout --orphan gh-pages
            git reset --hard
          fi

          cp "$GITHUB_WORKSPACE/screenshot.png" .
          cp "$GITHUB_WORKSPACE/icon.png" .
          git add screenshot.png icon.png
          git commit -m "Update screenshot and icon [skip ci]" || echo "No changes to commit"
          git push origin gh-pages
          cd -
          git worktree remove /tmp/gh-pages --force

      - name: Output URLs
        if: github.ref == 'refs/heads/main'
        run: |
          REPO="${{ github.repository }}"
          echo "Screenshot: https://raw.githubusercontent.com/$REPO/gh-pages/screenshot.png"
          echo "Icon: https://raw.githubusercontent.com/$REPO/gh-pages/icon.png"

      - name: Cleanup Virtual Display
        if: always()
        run: |
          if [ -f display_pid.txt ]; then
            PID=$(cat display_pid.txt)
            echo "Terminating virtual display process (PID: $PID)"
            kill "$PID" 2>/dev/null || true
          fi
