name: Screenshot

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  screenshot:
    runs-on: macos-26

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Swift
        uses: swift-actions/setup-swift@v2
        with:
          swift-version: "6.2"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - name: Set Desktop Background
        run: |
          # Use a nice macOS wallpaper
          WALLPAPER="/System/Library/Desktop Pictures/Sequoia Sunrise.heic"
          if [ ! -f "$WALLPAPER" ]; then
            WALLPAPER=$(find /System/Library/Desktop\ Pictures -name "*.heic" | head -1)
          fi
          if [ -n "$WALLPAPER" ] && [ -f "$WALLPAPER" ]; then
            osascript -e "tell application \"System Events\" to tell every desktop to set picture to \"$WALLPAPER\""
            sleep 1
          fi

      - name: Force Retina (HiDPI) Resolution
        run: |
          # Use VMware Tools to set resolution
          "/Library/Application Support/VMware Tools/vmware-resolutionSet" 2560 1440 || echo "::warning::Failed to set resolution via VMware Tools"
          sleep 5

          # Install displayplacer to enable HiDPI resolution
          brew install displayplacer

          # Get the persistent display ID
          DISPLAY_ID=$(displayplacer list | grep 'Persistent screen id:' | awk '{print $4}')
          echo "Display ID: $DISPLAY_ID"

          # Set to max resolution (2560x1440)
          displayplacer "id:$DISPLAY_ID res:2560x1440 hz:60 color_depth:8 scaling:on"

          # Disable font smoothing (cleaner screenshots)
          defaults write -g CGFontRenderingFontSmoothingDisabled -bool YES

      - name: Build and Screenshot
        run: make screenshot

      - name: Generate Icon PNG
        run: |
          sips -s format png ClipKitty.app/Contents/Resources/AppIcon.icns --out icon.png
          ls -lh screenshot.png icon.png

      - name: Upload Screenshot Artifact
        uses: actions/upload-artifact@v4
        with:
          name: assets
          path: |
            screenshot.png
            icon.png

      - name: Deploy to gh-pages
        if: github.ref == 'refs/heads/main'
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          git fetch origin gh-pages || true
          rm -rf /tmp/gh-pages
          if git show-ref --verify --quiet refs/remotes/origin/gh-pages; then
            git worktree add /tmp/gh-pages gh-pages
            cd /tmp/gh-pages
            git pull origin gh-pages || true
          else
            git worktree add --detach /tmp/gh-pages
            cd /tmp/gh-pages
            git checkout --orphan gh-pages
            git reset --hard
          fi

          cp "$GITHUB_WORKSPACE/screenshot.png" .
          cp "$GITHUB_WORKSPACE/icon.png" .
          git add screenshot.png icon.png
          git commit -m "Update screenshot and icon [skip ci]" || echo "No changes to commit"
          git push origin gh-pages
          cd -
          git worktree remove /tmp/gh-pages --force

      - name: Output URLs
        if: github.ref == 'refs/heads/main'
        run: |
          REPO="${{ github.repository }}"
          echo "Screenshot: https://raw.githubusercontent.com/$REPO/gh-pages/screenshot.png"
          echo "Icon: https://raw.githubusercontent.com/$REPO/gh-pages/icon.png"
