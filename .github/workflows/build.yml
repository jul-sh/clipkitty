name: Build and Release

on:
  push:
    branches: [main, release]
  pull_request:
    branches: [main, release]
  workflow_dispatch:

permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  rust-tests:
    name: Rust Tests
    runs-on: macos-26

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          lfs: true

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@b66b36319cc6fde4ea85edd583b088c65d6b8710 # main 2026-04-08
        with:
          source-tag: v3.17.3
          flakehub: false

      - name: Verify lockfile integrity
        run: |
          ./Scripts/check-pinned-actions.sh
          ./Scripts/check-lockfile-drift.sh

      - name: Run Rust supply chain scan
        run: ./Scripts/run-in-nix.sh -c "cargo deny check"

      - name: Run Rust library tests
        run: ./Scripts/run-in-nix.sh -c "cargo test --manifest-path purr/Cargo.toml --lib --locked"

  build:
    needs: rust-tests
    runs-on: macos-26
    outputs:
      version: ${{ steps.resolve-version.outputs.version }}

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          lfs: true
          fetch-depth: 0  # Full history for commit count versioning

      - name: Configure macOS scrollbar behavior
        run: |
          defaults write -g AppleShowScrollBars -string WhenScrolling
          killall cfprefsd || true

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@b66b36319cc6fde4ea85edd583b088c65d6b8710 # main 2026-04-08
        with:
          source-tag: v3.17.3
          flakehub: false

      - name: Install CI tools from Nix
        run: |
          # Install tools from flake-locked nixpkgs (pinned via flake.lock)
          nix profile install --no-update-lock-file --inputs-from . nixpkgs#age
          nix profile install --no-update-lock-file --inputs-from . nixpkgs#cmark-gfm
          nix profile install --no-update-lock-file .#tuist
          tuist version

      - name: Decrypt secrets
        id: secrets
        run: |
          echo "$AGE_SECRET_KEY" > /tmp/age-key.txt
          chmod 600 /tmp/age-key.txt
          for f in secrets/*.age; do
            name=$(basename "$f" .age)
            value=$(age -d -i /tmp/age-key.txt "$f")
            echo "::add-mask::$value"
            {
              echo "${name}<<AGEDELIM"
              echo "$value"
              echo "AGEDELIM"
            } >> "$GITHUB_OUTPUT"
          done
          rm -f /tmp/age-key.txt
        env:
          AGE_SECRET_KEY: ${{ secrets.AGE_SECRET_KEY }}

      - name: Resolve Release Version
        id: resolve-version
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/release' || (github.event_name == 'pull_request' && (github.base_ref == 'main' || github.base_ref == 'release'))
        run: |
          TARGET_BRANCH="${GITHUB_BASE_REF:-${GITHUB_REF#refs/heads/}}"
          BASE_VERSION=$(grep '"MARKETING_VERSION":' Project.swift | head -1 | sed 's/.*: *"\(.*\)".*/\1/')
          echo "Base version from Project.swift: $BASE_VERSION"

          # Extract major.minor from Project.swift, use commit count as patch
          IFS='.' read -r major minor _patch <<< "$BASE_VERSION"
          COMMIT_COUNT=$(git rev-list --count HEAD)
          VERSION="${major}.${minor}.${COMMIT_COUNT}"
          echo "Using commit count for patch: $VERSION"

          if [ "$TARGET_BRANCH" = "main" ]; then
            CHANNEL="beta"
            RELEASE_TAG="v${VERSION}-beta"
            RELEASE_TITLE="ClipKitty v${VERSION} Beta"
            RELEASE_URL="https://github.com/${{ github.repository }}/releases/download/v${VERSION}-beta/ClipKitty.dmg"
          else
            # Stable releases from release branch
            CHANNEL="stable"
            RELEASE_TAG="v${VERSION}"
            RELEASE_TITLE="ClipKitty v${VERSION}"
            RELEASE_URL="https://github.com/${{ github.repository }}/releases/download/v${VERSION}/ClipKitty.dmg"
          fi

          echo "VERSION=$VERSION" >> "$GITHUB_ENV"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "channel=$CHANNEL" >> "$GITHUB_OUTPUT"
          echo "release_tag=$RELEASE_TAG" >> "$GITHUB_OUTPUT"
          echo "release_title=$RELEASE_TITLE" >> "$GITHUB_OUTPUT"
          echo "release_url=$RELEASE_URL" >> "$GITHUB_OUTPUT"
          echo "Final release version: $VERSION"

      - name: Setup Swift
        uses: swift-actions/setup-swift@7ca6abe6b3b0e8b5421b88be48feee39cbf52c6a # v2
        with:
          swift-version: "6.2"

      # 1. Install Apple Certificates for Signing
      - name: Install Developer ID Certificate
        uses: apple-actions/import-codesign-certs@63fff01cd422d4b7b855d40ca1e9d34d2de9427d # v3
        with:
          p12-file-base64: ${{ steps.secrets.outputs.MACOS_P12_BASE64 }}
          p12-password: ${{ steps.secrets.outputs.MACOS_P12_PASSWORD }}

      - name: Install Apple Development Certificate
        uses: apple-actions/import-codesign-certs@63fff01cd422d4b7b855d40ca1e9d34d2de9427d # v3
        with:
          p12-file-base64: ${{ steps.secrets.outputs.MAC_DEV_P12_BASE64 }}
          p12-password: ${{ steps.secrets.outputs.MAC_DEV_P12_PASSWORD }}
          keychain: dev_signing

      - name: Fix keychain search list
        run: |
          security list-keychains -d user -s \
            ~/Library/Keychains/signing_temp.keychain-db \
            ~/Library/Keychains/dev_signing.keychain-db \
            ~/Library/Keychains/login.keychain-db

      - name: Generate Xcode Project
        run: ./Scripts/nix-generate.sh

      - name: Verify lockfiles unchanged
        run: ./Scripts/check-lockfile-drift.sh

      - name: Prepare Xcode Authentication
        id: xcode-auth
        run: |
          mkdir -p .make/keys
          ./distribution/asc-auth.sh private-key-b64 | base64 --decode > .make/keys/AuthKey.p8
          echo "key_id=$(./distribution/asc-auth.sh key-id)" >> "$GITHUB_OUTPUT"
          echo "issuer_id=$(./distribution/asc-auth.sh issuer-id)" >> "$GITHUB_OUTPUT"
          echo "key_path=$(pwd)/.make/keys/AuthKey.p8" >> "$GITHUB_OUTPUT"
        env:
          AGE_SECRET_KEY: ${{ secrets.AGE_SECRET_KEY }}

      - name: Build App (SparkleRelease)
        run: ./Scripts/nix-build-app.sh SparkleRelease
        env:
          AGE_SECRET_KEY: ${{ secrets.AGE_SECRET_KEY }}

      - name: Build App (AppStore)
        run: ./Scripts/nix-build-app.sh AppStore
        env:
          AGE_SECRET_KEY: ${{ secrets.AGE_SECRET_KEY }}

      - name: Build and Sign App (Hardened)
        run: ./Scripts/nix-sign-app.sh Hardened
        env:
          AGE_SECRET_KEY: ${{ secrets.AGE_SECRET_KEY }}

      - name: Create AppStore Archive
        run: |
          cd DerivedData/Build/Products/AppStore
          zip -r "$GITHUB_WORKSPACE/ClipKitty-AppStore.zip" ClipKitty.app

      - name: Verify Hardened Entitlements
        run: |
          APP="DerivedData/Build/Products/Hardened/ClipKitty.app"
          echo "=== Hardened entitlements (from signed app) ==="
          codesign -d --entitlements - "$APP" 2>&1
          # Extract entitlements XML and verify contents
          ENT_XML=$(codesign -d --entitlements - "$APP" 2>&1)
          # Verify sandbox is present
          echo "$ENT_XML" | grep -q "app-sandbox"
          # Verify no network entitlement
          if echo "$ENT_XML" | grep -q "network.client"; then
            echo "FAIL: network.client entitlement found in hardened app"
            exit 1
          fi
          # Verify no iCloud entitlements
          if echo "$ENT_XML" | grep -qi "icloud\|cloudkit"; then
            echo "FAIL: iCloud/CloudKit entitlement found in hardened app"
            exit 1
          fi
          # Verify no file entitlements
          if echo "$ENT_XML" | grep -q "files.user-selected"; then
            echo "FAIL: file read entitlement found in hardened app"
            exit 1
          fi
          echo "Hardened entitlements verified."

      - name: Verify Hardened Binary Linkage
        run: |
          BINARY="DerivedData/Build/Products/Hardened/ClipKitty.app/Contents/MacOS/ClipKitty"
          echo "=== Hardened binary linkage ==="
          otool -L "$BINARY"
          # Verify no Sparkle framework references
          if otool -L "$BINARY" | grep -qi sparkle; then
            echo "FAIL: Sparkle found in hardened binary linkage"
            exit 1
          fi
          echo "No Sparkle linkage in hardened binary."

      - name: Create Hardened Archive
        run: |
          cd DerivedData/Build/Products/Hardened
          zip -r "$GITHUB_WORKSPACE/ClipKitty-Hardened.zip" ClipKitty.app

      - name: Verify Hardened Feature Surface
        run: |
          APP="DerivedData/Build/Products/Hardened/ClipKitty.app"
          BINARY="$APP/Contents/MacOS/ClipKitty"
          echo "=== Hardened feature surface assertions ==="

          PLIST="$APP/Contents/Info.plist"

          fail() { echo "FAIL: $1"; echo "## Hardened Verification Failed" >> "$GITHUB_STEP_SUMMARY"; echo "$1" >> "$GITHUB_STEP_SUMMARY"; exit 1; }

          # --- Binary-level checks (compiled-out code paths) ---

          # Assert link preview code is compiled out (ENABLE_LINK_PREVIEWS)
          if strings "$BINARY" | grep -q "refreshLinkMetadata"; then
            fail "link preview method 'refreshLinkMetadata' found in hardened binary"
          fi
          echo "✓ No link preview code in binary"

          # Assert iCloud sync code is compiled out (ENABLE_ICLOUD_SYNC)
          if strings "$BINARY" | grep -q "SyncEngine"; then
            fail "SyncEngine found in hardened binary"
          fi
          echo "✓ No iCloud sync code in binary"

          # Assert Sparkle updater code is compiled out (ENABLE_SPARKLE_UPDATES)
          if strings "$BINARY" | grep -q "SPUUpdater"; then
            fail "Sparkle updater class found in hardened binary"
          fi
          echo "✓ No Sparkle update code in binary"

          # Assert file clipboard code is compiled out (ENABLE_FILE_CLIPBOARD_ITEMS)
          if strings "$BINARY" | grep -q "saveFileItems"; then
            fail "file clipboard method 'saveFileItems' found in hardened binary"
          fi
          echo "✓ No file clipboard code in binary"

          # Assert build attestation link code is compiled out (ENABLE_BUILD_ATTESTATION_LINK)
          if strings "$BINARY" | grep -q "checkAttestation"; then
            fail "build attestation link method 'checkAttestation' found in hardened binary"
          fi
          echo "✓ No build attestation link code in binary"

          # --- Build settings checks (Info.plist) ---

          # Verify bundle ID is hardened-specific (separate sandbox container)
          BUNDLE_ID=$(/usr/libexec/PlistBuddy -c "Print :CFBundleIdentifier" "$PLIST" 2>/dev/null || echo "")
          if [ "$BUNDLE_ID" != "com.eviljuliette.clipkitty.hardened" ]; then
            fail "CFBundleIdentifier is '$BUNDLE_ID', expected 'com.eviljuliette.clipkitty.hardened'"
          fi
          echo "✓ Bundle ID: com.eviljuliette.clipkitty.hardened"

          # Verify build channel is Hardened
          CHANNEL=$(/usr/libexec/PlistBuddy -c "Print :CKBuildChannel" "$PLIST" 2>/dev/null || echo "")
          if [ "$CHANNEL" != "Hardened" ]; then
            fail "CKBuildChannel is '$CHANNEL', expected 'Hardened'"
          fi
          echo "✓ Build channel: Hardened"

          # Verify no Sparkle feed URL in Info.plist
          FEED=$(/usr/libexec/PlistBuddy -c "Print :SUFeedURL" "$PLIST" 2>/dev/null || echo "")
          if [ -n "$FEED" ]; then
            fail "SUFeedURL found in hardened Info.plist: $FEED"
          fi
          echo "✓ No Sparkle feed URL in Info.plist"

          # Verify display name is correct
          DISPLAY_NAME=$(/usr/libexec/PlistBuddy -c "Print :CFBundleDisplayName" "$PLIST" 2>/dev/null || echo "")
          if [ "$DISPLAY_NAME" != "ClipKitty Hardened" ]; then
            fail "CFBundleDisplayName is '$DISPLAY_NAME', expected 'ClipKitty Hardened'"
          fi
          echo "✓ Display name: ClipKitty Hardened"

          echo "Hardened feature surface verified."

      - name: Build iOS Smoke Test
        run: nix build '.#checks.aarch64-darwin.clipkitty-ios-smoke-build' -L

      - name: Build iOS App (AppStore)
        run: |
          BASE_VERSION=$(grep '"MARKETING_VERSION":' Project.swift | head -1 | sed 's/.*: *"\(.*\)".*/\1/')
          IFS='.' read -r major minor _patch <<< "$BASE_VERSION"
          COMMIT_COUNT=$(git rev-list --count HEAD)
          VERSION="${major}.${minor}.${COMMIT_COUNT}"
          xcodebuild build \
            -workspace ClipKitty.xcworkspace \
            -scheme ClipKittyiOS-AppStore \
            -derivedDataPath DerivedData \
            -destination "generic/platform=iOS" \
            -allowProvisioningUpdates \
            -authenticationKeyPath ${{ steps.xcode-auth.outputs.key_path }} \
            -authenticationKeyID ${{ steps.xcode-auth.outputs.key_id }} \
            -authenticationKeyIssuerID ${{ steps.xcode-auth.outputs.issuer_id }} \
            MARKETING_VERSION="$VERSION" \
            CURRENT_PROJECT_VERSION="$COMMIT_COUNT" \
            CODE_SIGNING_ALLOWED=NO

      - name: Generate Localized Demo Databases
        run: LOCKED=1 ./distribution/patch-demo-items.sh

      - name: Generate iOS Marketing Screenshots
        run: |
          set -euo pipefail
          for locale in en es zh-Hans zh-Hant ja ko fr de pt-BR ru; do
            echo "Capturing iOS screenshots for $locale..."
            mkdir -p marketing-ios/$locale
            echo "$locale" > /tmp/clipkitty_ios_screenshot_locale.txt
            if [ "$locale" = "en" ]; then
              echo "SyntheticData.sqlite" > /tmp/clipkitty_ios_screenshot_db.txt
            else
              echo "SyntheticData_${locale}.sqlite" > /tmp/clipkitty_ios_screenshot_db.txt
            fi
            if [ "$locale" = "en" ]; then
              prefix=""
            else
              prefix="${locale}_"
            fi
            for n in 1 2 3; do
              rm -f "/tmp/clipkitty_ios_${prefix}marketing_${n}_"*.png
            done
            xcodebuild test \
              -workspace ClipKitty.xcworkspace \
              -scheme ClipKittyiOSUITests \
              -destination "platform=iOS Simulator,name=iPhone 17" \
              -derivedDataPath DerivedData \
              CODE_SIGNING_ALLOWED=NO \
              -only-testing:ClipKittyiOSUITests/ClipKittyiOSScreenshotTests/testTakeMarketingScreenshots \
              2>&1 | tee /tmp/clipkitty_ios_screenshot_test.log | grep -E "(Test Case|passed|failed)" || true
            if ! grep -q "Test.*passed" /tmp/clipkitty_ios_screenshot_test.log; then
              echo "::error::iOS screenshot test did not pass for $locale"
              tail -60 /tmp/clipkitty_ios_screenshot_test.log
              exit 1
            fi
            cp "/tmp/clipkitty_ios_${prefix}marketing_1_history.png" "marketing-ios/$locale/screenshot_1.png"
            cp "/tmp/clipkitty_ios_${prefix}marketing_2_search.png" "marketing-ios/$locale/screenshot_2.png"
            cp "/tmp/clipkitty_ios_${prefix}marketing_3_filter.png" "marketing-ios/$locale/screenshot_3.png"
          done
          rm -f /tmp/clipkitty_ios_screenshot_locale.txt /tmp/clipkitty_ios_screenshot_db.txt
          echo "Generated iOS screenshots:"
          if ! ls -lh marketing-ios/*/screenshot_*.png 2>/dev/null; then
            echo "::error::No iOS screenshots were generated"
            exit 1
          fi
          for locale in en es zh-Hans zh-Hant ja ko fr de pt-BR ru; do
            if [ ! -f "marketing-ios/$locale/screenshot_1.png" ]; then
              echo "::error::Missing marketing-ios/$locale/screenshot_1.png"
              exit 1
            fi
          done

      - name: Run UI Tests
        env:
          LOCKED: "1"
        run: |
          set +e
          xcodebuild test \
            -workspace ClipKitty.xcworkspace \
            -scheme ClipKittyUITests \
            -destination "platform=macOS" \
            -derivedDataPath DerivedData \
            CODE_SIGNING_ALLOWED=NO \
            -skip-testing:ClipKittyUITests/ClipKittyUITests/testRecordIntroVideo \
            -skip-testing:ClipKittyUITests/ClipKittyUITests/testTakeMarketingScreenshots \
            -resultBundlePath TestResults.xcresult \
            2>&1 | tee xcodebuild-test.log
          TEST_EXIT=$?
          echo "::group::Test Summary"
          grep -E "(Test Case|Test Suite|passed|failed|error:|Failing tests:)" xcodebuild-test.log || true
          echo "::endgroup::"
          if [ -d TestResults.xcresult ]; then
            echo "::group::xcresulttool Summary"
            xcrun xcresulttool get test-results summary --path TestResults.xcresult 2>/dev/null || true
            echo "::endgroup::"
          fi
          exit $TEST_EXIT

      - name: Upload Test Results
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: TestResults
          path: |
            TestResults.xcresult
            xcodebuild-test.log
          if-no-files-found: ignore


      - name: Create Virtual Retina Display
        run: |
          xcrun clang -framework CoreGraphics -framework Foundation \
            -o /tmp/create-retina-display distribution/create-retina-display.m
          /tmp/create-retina-display &
          echo "$!" > /tmp/retina-display.pid
          sleep 5

      - name: Generate Marketing Screenshots
        run: |
          SKIP_SIGNING=1 LOCKED=1 ./distribution/marketing-screenshots-localized.sh
          ls -lh marketing/*/screenshot_*.png
        env:
          AGE_SECRET_KEY: ${{ secrets.AGE_SECRET_KEY }}

      - name: Teardown Virtual Display
        if: always()
        run: kill "$(cat /tmp/retina-display.pid 2>/dev/null)" 2>/dev/null || true

      - name: Generate Icon PNG
        run: ./distribution/icon-png.sh

      - name: Build and Sign DMG
        run: |
          chmod +x distribution/build-dmg.sh

          APP="DerivedData/Build/Products/SparkleRelease/ClipKitty.app"

          # Embed Developer ID provisioning profile (required for CloudKit entitlements)
          ./distribution/read-secret.sh DEVELOPER_ID_PROVISION_PROFILE_BASE64 \
            | base64 --decode \
            > "$APP/Contents/embedded.provisionprofile"

          # Sign nested frameworks/bundles first (inside-out for Sparkle, XPC services, etc.)
          if [ -d "$APP/Contents/Frameworks" ]; then
            find "$APP/Contents/Frameworks" \( -type f -perm +111 -o -name "*.dylib" \) | while read -r binary; do
              codesign --force --options runtime --timestamp --sign "Developer ID Application" "$binary"
            done
          fi

          # Sign the outer app (must come last)
          codesign --force --options runtime --timestamp --sign "Developer ID Application" \
            --entitlements Sources/MacApp/ClipKitty.sparkle.entitlements \
            "$APP"
          codesign --verify --deep --strict "$APP"

          ./distribution/build-dmg.sh "$APP" ClipKitty.dmg
          codesign --force --sign "Developer ID Application" ClipKitty.dmg
        env:
          AGE_SECRET_KEY: ${{ secrets.AGE_SECRET_KEY }}

      # 2. Notarize with Apple
      - name: Notarize DMG
        run: |
          echo "$NOTARY_KEY_BASE64" | base64 --decode > auth_key.p8
          xcrun notarytool submit ClipKitty.dmg \
            --key auth_key.p8 \
            --key-id "$NOTARY_KEY_ID" \
            --issuer "$NOTARY_ISSUER_ID" \
            --wait --output-format json | tee notarization_result.json

          STATUS=$(python3 -c "import json,sys; print(json.load(sys.stdin)['status'])" < notarization_result.json)

          if [ "$STATUS" != "Accepted" ]; then
            echo "::error::Notarization failed with status: $STATUS"
            SUBMISSION_ID=$(python3 -c "import json,sys; print(json.load(sys.stdin)['id'])" < notarization_result.json)
            xcrun notarytool log "$SUBMISSION_ID" \
              --key auth_key.p8 \
              --key-id "$NOTARY_KEY_ID" \
              --issuer "$NOTARY_ISSUER_ID" || true
            exit 1
          fi
        env:
          NOTARY_KEY_BASE64: ${{ steps.secrets.outputs.NOTARY_KEY_BASE64 }}
          NOTARY_KEY_ID: ${{ steps.secrets.outputs.NOTARY_KEY_ID }}
          NOTARY_ISSUER_ID: ${{ steps.secrets.outputs.NOTARY_ISSUER_ID }}

      - name: Clean up Notary Key
        if: always()
        run: rm -f auth_key.p8

      # 3. Staple Notarization (Required for offline Gatekeeper approval)
      #    Apple's CDN can occasionally lag behind even after "Accepted" status.
      - name: Staple Notarization
        run: |
          for i in $(seq 1 10); do
            if xcrun stapler staple ClipKitty.dmg; then
              echo "Stapling succeeded on attempt $i"
              exit 0
            fi
            echo "Staple attempt $i failed, retrying in 15s..."
            sleep 15
          done
          echo "Stapling failed after 10 attempts"
          exit 1

      - name: Install Sparkle CLI Tools
        if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/release')
        run: ./Scripts/install-sparkle-cli.sh

      - name: Sign DMG with EdDSA
        if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/release')
        id: eddsa-sign
        run: |
          SIGNATURE=$(echo "$SPARKLE_EDDSA_KEY" | sign_update ClipKitty.dmg --ed-key-file -)
          # sign_update outputs: sparkle:edSignature="..." length="..."
          ED_SIGNATURE=$(echo "$SIGNATURE" | sed 's/.*sparkle:edSignature="\([^"]*\)".*/\1/')
          FILE_LENGTH=$(echo "$SIGNATURE" | sed 's/.*length="\([^"]*\)".*/\1/')
          echo "ed_signature=$ED_SIGNATURE" >> "$GITHUB_OUTPUT"
          echo "file_length=$FILE_LENGTH" >> "$GITHUB_OUTPUT"
        env:
          SPARKLE_EDDSA_KEY: ${{ steps.secrets.outputs.SPARKLE_EDDSA_KEY }}

      - name: Verify lockfiles unchanged before attestation
        run: ./Scripts/check-lockfile-drift.sh

      - name: Attest Build Provenance
        uses: actions/attest-build-provenance@e8998f949152b193b063cb0ec769d69d929409be # v2
        with:
          subject-path: |
            ClipKitty.dmg
            DerivedData/Build/Products/SparkleRelease/ClipKitty.app/Contents/MacOS/ClipKitty
            ClipKitty-Hardened.zip

      - name: Create Channel Release
        if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/release')
        run: |
          gh release delete "${{ steps.resolve-version.outputs.release_tag }}" --yes --cleanup-tag 2>/dev/null || true

          args=(
            release create "${{ steps.resolve-version.outputs.release_tag }}"
            --title "${{ steps.resolve-version.outputs.release_title }}"
            --generate-notes
            --target "$GITHUB_SHA"
            ClipKitty.dmg
            ClipKitty-Hardened.zip
          )

          if [ "${{ steps.resolve-version.outputs.channel }}" = "beta" ]; then
            args+=(--prerelease)
          fi

          gh "${args[@]}"
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Update Homebrew Tap
        if: github.event_name == 'push' && github.ref == 'refs/heads/release'
        run: |
          TAG="v$VERSION"
          SHA256=$(shasum -a 256 ClipKitty.dmg | cut -d' ' -f1)

          git clone https://x-access-token:${HOMEBREW_TAP_TOKEN}@github.com/jul-sh/homebrew-clipkitty.git /tmp/homebrew-tap
          cd /tmp/homebrew-tap

          mkdir -p Casks
          printf '%s\n' \
            'cask "clipkitty" do' \
            "  version \"$VERSION\"" \
            "  sha256 \"$SHA256\"" \
            '' \
            "  url \"https://github.com/jul-sh/clipkitty/releases/download/$TAG/ClipKitty.dmg\"" \
            '  name "ClipKitty"' \
            '  desc "Clipboard history manager with instant fuzzy search"' \
            '  homepage "https://github.com/jul-sh/clipkitty"' \
            '' \
            '  app "ClipKitty.app"' \
            '' \
            '  postflight do' \
            '    system_command "/usr/sbin/chown",' \
            '                   args: ["-R", "#{ENV["USER"]}:staff", "#{appdir}/ClipKitty.app"],' \
            '                   sudo: true' \
            '  end' \
            'end' > Casks/clipkitty.rb

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Casks/clipkitty.rb
          git diff --cached --quiet || git commit -m "Update ClipKitty to $VERSION"
          git push origin main
        env:
          HOMEBREW_TAP_TOKEN: ${{ steps.secrets.outputs.HOMEBREW_TAP_TOKEN }}

      - name: Upload Artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: ClipKitty-Builds
          path: ClipKitty.dmg

      - name: Upload AppStore Build
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: ClipKitty-AppStore
          path: ClipKitty-AppStore.zip

      - name: Upload Hardened Build
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: ClipKitty-Hardened
          path: ClipKitty-Hardened.zip

      - name: Upload Screenshot Artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: assets
          path: |
            icon.png
            marketing/*/screenshot_*.png

      - name: Upload iOS Screenshot Artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: ios-assets
          path: marketing-ios/*/screenshot_*.png
          if-no-files-found: ignore

      - name: Deploy to gh-pages
        if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/release')
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          git fetch origin gh-pages || true
          rm -rf /tmp/gh-pages
          if git show-ref --verify --quiet refs/remotes/origin/gh-pages; then
            git worktree add /tmp/gh-pages gh-pages
            cd /tmp/gh-pages
            git pull origin gh-pages || true
          else
            git worktree add --detach /tmp/gh-pages
            cd /tmp/gh-pages
            git checkout --orphan gh-pages
            git reset --hard
          fi

          cp "$GITHUB_WORKSPACE/icon.png" .
          cp "$GITHUB_WORKSPACE/marketing/en/screenshot_1.png" marketing_1.png
          cp "$GITHUB_WORKSPACE/marketing/en/screenshot_2.png" marketing_2.png
          cp "$GITHUB_WORKSPACE/marketing/en/screenshot_3.png" marketing_3.png

          if [ "$GITHUB_REF_NAME" = "main" ] || [ "$GITHUB_REF_NAME" = "release" ]; then
            [ -f appcast-state.json ] || printf '{}\n' > appcast-state.json

            python3 "$GITHUB_WORKSPACE/distribution/update_appcast_state.py" \
              --state-path appcast-state.json \
              --channel "${{ steps.resolve-version.outputs.channel }}" \
              --version "${{ steps.resolve-version.outputs.version }}" \
              --url "${{ steps.resolve-version.outputs.release_url }}" \
              --signature "${{ steps.eddsa-sign.outputs.ed_signature }}" \
              --length "${{ steps.eddsa-sign.outputs.file_length }}"

            python3 "$GITHUB_WORKSPACE/distribution/generate_appcast.py" \
              --state-path appcast-state.json \
              --output-path appcast.xml

            xmllint --noout appcast.xml
          fi

          # Generate landing page from README.md (cmark-gfm installed via Nix)
          "$GITHUB_WORKSPACE/distribution/generate-landing-page.sh" > index.html

          git add icon.png marketing_1.png marketing_2.png marketing_3.png index.html
          git add appcast.xml appcast-state.json 2>/dev/null || true
          git commit -m "Update site, screenshots and icon [skip ci]" || echo "No changes to commit"
          git push origin gh-pages

          git tag "screenshots/${GITHUB_SHA::7}"
          git push origin "screenshots/${GITHUB_SHA::7}"

          cd -
          git worktree remove /tmp/gh-pages --force

          REPO="${{ github.repository }}"
          echo "Icon: https://raw.githubusercontent.com/$REPO/gh-pages/icon.png"
          echo "Marketing 1: https://raw.githubusercontent.com/$REPO/gh-pages/marketing_1.png"
          echo "Marketing 2: https://raw.githubusercontent.com/$REPO/gh-pages/marketing_2.png"
          echo "Marketing 3: https://raw.githubusercontent.com/$REPO/gh-pages/marketing_3.png"

  # Generate localized intro videos for App Store previews.
  # Runs only on pushes to main/release or manual dispatch (not on PRs).
  # Uses Xcode's built-in UI test screen recording (xcresult bundle) which
  # does not require TCC Screen Recording permission.
  intro-videos:
    runs-on: macos-26
    needs: build
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          lfs: true
          fetch-depth: 0

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@b66b36319cc6fde4ea85edd583b088c65d6b8710 # main 2026-04-08
        with:
          source-tag: v3.17.3
          flakehub: false

      - name: Install CI tools from Nix
        run: |
          nix profile install --no-update-lock-file --inputs-from . nixpkgs#age
          nix profile install --no-update-lock-file --inputs-from . nixpkgs#ffmpeg
          nix profile install --no-update-lock-file .#tuist
          tuist version

      - name: Decrypt secrets
        run: |
          echo "$AGE_SECRET_KEY" > /tmp/age-key.txt
          chmod 600 /tmp/age-key.txt
          for f in secrets/*.age; do
            name=$(basename "$f" .age)
            value=$(age -d -i /tmp/age-key.txt "$f")
            echo "::add-mask::$value"
            {
              echo "${name}<<AGEDELIM"
              echo "$value"
              echo "AGEDELIM"
            } >> "$GITHUB_OUTPUT"
          done
          rm -f /tmp/age-key.txt
        env:
          AGE_SECRET_KEY: ${{ secrets.AGE_SECRET_KEY }}

      - name: Setup Swift
        uses: swift-actions/setup-swift@7ca6abe6b3b0e8b5421b88be48feee39cbf52c6a # v2
        with:
          swift-version: "6.2"

      - name: Generate Xcode Project
        run: ./Scripts/nix-generate.sh

      - name: Verify lockfiles unchanged
        run: ./Scripts/check-lockfile-drift.sh

      - name: Prepare API Key for Automatic Signing
        run: |
          mkdir -p .make/keys
          ./distribution/read-secret.sh NOTARY_KEY_BASE64 | base64 --decode > .make/keys/AuthKey.p8
        env:
          AGE_SECRET_KEY: ${{ secrets.AGE_SECRET_KEY }}

      - name: Build App
        run: ./Scripts/nix-build-app.sh Release
        env:
          AGE_SECRET_KEY: ${{ secrets.AGE_SECRET_KEY }}

      - name: Generate Localized Demo Databases
        run: LOCKED=1 ./distribution/patch-demo-items.sh

      - name: Create Virtual Retina Display
        run: |
          xcrun clang -framework CoreGraphics -framework Foundation \
            -o /tmp/create-retina-display distribution/create-retina-display.m
          /tmp/create-retina-display &
          echo "$!" > /tmp/retina-display.pid
          sleep 5

      - name: Generate Localized Intro Videos
        run: SKIP_SIGNING=1 LOCKED=1 ./distribution/intro-video-localized.sh
        env:
          AGE_SECRET_KEY: ${{ secrets.AGE_SECRET_KEY }}

      - name: Teardown Virtual Display
        if: always()
        run: kill "$(cat /tmp/retina-display.pid 2>/dev/null)" 2>/dev/null || true

      - name: Verify lockfiles unchanged after build
        run: ./Scripts/check-lockfile-drift.sh

      - name: Upload Intro Videos
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: intro-videos
          path: marketing/*/intro_video.mov

  # Upload to App Store Connect via ASC CLI
  appstore:
    runs-on: macos-26
    needs: [build, intro-videos]
    if: github.event_name == 'push' && (github.ref_name == 'main' || github.ref_name == 'release')

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0  # Full history for commit count versioning

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@b66b36319cc6fde4ea85edd583b088c65d6b8710 # main 2026-04-08
        with:
          source-tag: v3.17.3
          flakehub: false

      - name: Install CI tools from Nix
        run: |
          nix profile install --no-update-lock-file --inputs-from . nixpkgs#age
          nix profile install --no-update-lock-file .#tuist
          nix profile install --no-update-lock-file .#asc
          tuist version

      - name: Decrypt secrets
        id: secrets
        run: |
          echo "$AGE_SECRET_KEY" > /tmp/age-key.txt
          chmod 600 /tmp/age-key.txt
          for f in secrets/*.age; do
            name=$(basename "$f" .age)
            value=$(age -d -i /tmp/age-key.txt "$f")
            echo "::add-mask::$value"
            {
              echo "${name}<<AGEDELIM"
              echo "$value"
              echo "AGEDELIM"
            } >> "$GITHUB_OUTPUT"
          done
          rm -f /tmp/age-key.txt
        env:
          AGE_SECRET_KEY: ${{ secrets.AGE_SECRET_KEY }}

      - name: Setup Swift
        uses: swift-actions/setup-swift@7ca6abe6b3b0e8b5421b88be48feee39cbf52c6a # v2
        with:
          swift-version: "6.2"

      - name: Install Apple WWDR Intermediate Certificate
        run: |
          curl -sLo "$RUNNER_TEMP/AppleWWDRCAG3.cer" https://www.apple.com/certificateauthority/AppleWWDRCAG3.cer
          echo "dcf21878c77f4198e4b4614f03d696d89c66c66008d4244e1b99161aac91601f  $RUNNER_TEMP/AppleWWDRCAG3.cer" | shasum -a 256 --check
          sudo security add-trusted-cert -d -r unspecified -k /Library/Keychains/System.keychain "$RUNNER_TEMP/AppleWWDRCAG3.cer"

      - name: Install App Store Installer Certificate
        uses: apple-actions/import-codesign-certs@63fff01cd422d4b7b855d40ca1e9d34d2de9427d # v3
        with:
          p12-file-base64: ${{ steps.secrets.outputs.APPSTORE_CERT_BASE64 }}
          p12-password: ${{ steps.secrets.outputs.P12_PASSWORD }}

      - name: Install App Store Application Certificate
        uses: apple-actions/import-codesign-certs@63fff01cd422d4b7b855d40ca1e9d34d2de9427d # v3
        with:
          p12-file-base64: ${{ steps.secrets.outputs.APPSTORE_APP_CERT_BASE64 }}
          p12-password: ${{ steps.secrets.outputs.P12_PASSWORD }}
          keychain: app_signing

      - name: Remove duplicate Application cert from Installer P12
        run: |
          # The Installer P12 bundles an extra Application cert that causes ambiguity.
          # Delete it, keeping only the dedicated one from APPSTORE_APP_CERT_BASE64.
          WANTED=$(security find-certificate -c "3rd Party Mac Developer Application" -Z \
            ~/Library/Keychains/app_signing.keychain-db 2>/dev/null \
            | grep "SHA-1" | awk '{print $NF}')
          for HASH in $(security find-certificate -a -c "3rd Party Mac Developer Application" -Z \
            ~/Library/Keychains/signing_temp.keychain-db 2>/dev/null \
            | grep "SHA-1" | awk '{print $NF}'); do
            if [ "$HASH" != "$WANTED" ]; then
              security delete-certificate -Z "$HASH" ~/Library/Keychains/signing_temp.keychain-db 2>/dev/null || true
            fi
          done
          # Restore signing_temp to search list (the app_signing import above drops it)
          security list-keychains -d user -s \
            ~/Library/Keychains/signing_temp.keychain-db \
            ~/Library/Keychains/app_signing.keychain-db \
            ~/Library/Keychains/login.keychain-db

      - name: Download marketing screenshots
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: assets
          path: .

      - name: Download intro videos
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: intro-videos
          path: .

      - name: Prepare API Key for Automatic Signing
        run: |
          mkdir -p .make/keys
          ./distribution/asc-auth.sh private-key-b64 | base64 --decode > .make/keys/AuthKey.p8
        env:
          AGE_SECRET_KEY: ${{ secrets.AGE_SECRET_KEY }}

      - name: Generate Xcode Project
        run: ./Scripts/nix-generate.sh

      - name: Build and Publish to App Store Connect
        run: |
          BASE_VERSION=$(grep '"MARKETING_VERSION":' Project.swift | head -1 | sed 's/.*: *"\(.*\)".*/\1/')
          IFS='.' read -r major minor _patch <<< "$BASE_VERSION"
          COMMIT_COUNT=$(git rev-list --count HEAD)
          VERSION="${major}.${minor}.${COMMIT_COUNT}"
          ./distribution/appstore-publish.sh "$VERSION" "$COMMIT_COUNT"
        env:
          AGE_SECRET_KEY: ${{ secrets.AGE_SECRET_KEY }}

      - name: Verify lockfiles unchanged
        run: ./Scripts/check-lockfile-drift.sh

      - name: Attest App Store Build Provenance
        uses: actions/attest-build-provenance@e8998f949152b193b063cb0ec769d69d929409be # v2
        with:
          subject-path: |
            ClipKitty.pkg
            DerivedData/Build/Products/AppStore/ClipKitty.app/Contents/MacOS/ClipKitty

      - name: Cleanup
        if: always()
        run: rm -f "$GITHUB_WORKSPACE/ClipKitty.provisionprofile"

  # Upload iOS app to App Store Connect
  ios-appstore:
    runs-on: macos-26
    needs: build
    if: github.event_name == 'push' && (github.ref_name == 'main' || github.ref_name == 'release')

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@b66b36319cc6fde4ea85edd583b088c65d6b8710 # main 2026-04-08
        with:
          source-tag: v3.17.3
          flakehub: false

      - name: Install CI tools from Nix
        run: |
          nix profile install --no-update-lock-file --inputs-from . nixpkgs#age
          nix profile install --no-update-lock-file .#tuist
          nix profile install --no-update-lock-file .#asc
          tuist version

      - name: Decrypt secrets
        id: secrets
        run: |
          echo "$AGE_SECRET_KEY" > /tmp/age-key.txt
          chmod 600 /tmp/age-key.txt
          for f in secrets/*.age; do
            name=$(basename "$f" .age)
            value=$(age -d -i /tmp/age-key.txt "$f")
            echo "::add-mask::$value"
            {
              echo "${name}<<AGEDELIM"
              echo "$value"
              echo "AGEDELIM"
            } >> "$GITHUB_OUTPUT"
          done
          rm -f /tmp/age-key.txt
        env:
          AGE_SECRET_KEY: ${{ secrets.AGE_SECRET_KEY }}

      - name: Setup Swift
        uses: swift-actions/setup-swift@7ca6abe6b3b0e8b5421b88be48feee39cbf52c6a # v2
        with:
          swift-version: "6.2"

      - name: Install Apple WWDR Intermediate Certificate
        run: |
          curl -sLo "$RUNNER_TEMP/AppleWWDRCAG3.cer" https://www.apple.com/certificateauthority/AppleWWDRCAG3.cer
          echo "dcf21878c77f4198e4b4614f03d696d89c66c66008d4244e1b99161aac91601f  $RUNNER_TEMP/AppleWWDRCAG3.cer" | shasum -a 256 --check
          sudo security add-trusted-cert -d -r unspecified -k /Library/Keychains/System.keychain "$RUNNER_TEMP/AppleWWDRCAG3.cer"

      - name: Install iOS Distribution Certificate
        uses: apple-actions/import-codesign-certs@63fff01cd422d4b7b855d40ca1e9d34d2de9427d # v3
        with:
          p12-file-base64: ${{ steps.secrets.outputs.IOS_DIST_CERT_BASE64 }}
          p12-password: ${{ steps.secrets.outputs.IOS_DIST_P12_PASSWORD }}
          keychain: ios_signing

      - name: Fix keychain search list
        run: |
          security list-keychains -d user -s \
            ~/Library/Keychains/ios_signing.keychain-db \
            ~/Library/Keychains/login.keychain-db

      - name: Install iOS Provisioning Profiles
        run: |
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          echo "$APP_PROFILE" | base64 --decode > ~/Library/MobileDevice/Provisioning\ Profiles/clipkitty-ios.mobileprovision
          echo "$SHARE_PROFILE" | base64 --decode > ~/Library/MobileDevice/Provisioning\ Profiles/clipkitty-share.mobileprovision
        env:
          APP_PROFILE: ${{ steps.secrets.outputs.IOS_APPSTORE_PROFILE_BASE64 }}
          SHARE_PROFILE: ${{ steps.secrets.outputs.IOS_SHARE_PROFILE_BASE64 }}

      - name: Download iOS screenshots
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: ios-assets
          path: marketing-ios

      - name: Verify iOS screenshots present
        run: |
          for locale in en es zh-Hans zh-Hant ja ko fr de pt-BR ru; do
            if [ ! -f "marketing-ios/$locale/screenshot_1.png" ]; then
              echo "::error::Missing marketing-ios/$locale/screenshot_1.png — cannot publish to ASC"
              exit 1
            fi
          done

      - name: Prepare API Key
        run: |
          mkdir -p .make/keys
          ./distribution/asc-auth.sh private-key-b64 | base64 --decode > .make/keys/AuthKey.p8
        env:
          AGE_SECRET_KEY: ${{ secrets.AGE_SECRET_KEY }}

      - name: Generate Xcode Project
        run: ./Scripts/nix-generate.sh

      - name: Verify lockfiles unchanged
        run: ./Scripts/check-lockfile-drift.sh

      - name: Build and Publish iOS to App Store Connect
        run: |
          BASE_VERSION=$(grep '"MARKETING_VERSION":' Project.swift | head -1 | sed 's/.*: *"\(.*\)".*/\1/')
          IFS='.' read -r major minor _patch <<< "$BASE_VERSION"
          COMMIT_COUNT=$(git rev-list --count HEAD)
          VERSION="${major}.${minor}.${COMMIT_COUNT}"
          ./distribution/ios-appstore-publish.sh "$VERSION" "$COMMIT_COUNT"
        env:
          AGE_SECRET_KEY: ${{ secrets.AGE_SECRET_KEY }}

      - name: Verify lockfiles unchanged after build
        run: ./Scripts/check-lockfile-drift.sh

      - name: Cleanup
        if: always()
        run: |
          rm -f ~/Library/MobileDevice/Provisioning\ Profiles/clipkitty-ios.mobileprovision
          rm -f ~/Library/MobileDevice/Provisioning\ Profiles/clipkitty-share.mobileprovision
