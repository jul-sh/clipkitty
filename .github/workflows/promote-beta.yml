name: Promote Beta Releases

on:
  schedule:
    - cron: "0 14 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  promote:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Find eligible beta release
        id: candidate
        run: |
          gh release list --limit 100 --json tagName,isPrerelease,publishedAt,targetCommitish > releases.json

          python3 - <<'PY' >> "$GITHUB_OUTPUT"
          import json
          from datetime import datetime, timedelta, timezone

          with open("releases.json", "r", encoding="utf-8") as handle:
              releases = json.load(handle)

          stable_tags = {
              release["tagName"]
              for release in releases
              if not release["isPrerelease"]
          }

          cutoff = datetime.now(timezone.utc) - timedelta(days=21)
          candidates = []

          for release in releases:
              tag = release["tagName"]
              if not release["isPrerelease"] or not tag.startswith("v") or not tag.endswith("-beta"):
                  continue

              version = tag[1:-5]
              stable_tag = f"v{version}"
              published_at = datetime.fromisoformat(release["publishedAt"].replace("Z", "+00:00"))

              if stable_tag in stable_tags or published_at > cutoff:
                  continue

              candidates.append((published_at, version, release["targetCommitish"]))

          if not candidates:
              print("found=false")
          else:
              candidates.sort(key=lambda item: item[0])
              _, version, target_commitish = candidates[0]
              print("found=true")
              print(f"version={version}")
              print(f"target_commitish={target_commitish}")
          PY
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Promote to release-stable
        if: steps.candidate.outputs.found == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git remote set-url origin "https://x-access-token:${GH_TOKEN}@github.com/${{ github.repository }}.git"

          CURRENT_TARGET=$(git ls-remote --heads origin release-stable | awk '{print $1}')
          if [ "$CURRENT_TARGET" = "${{ steps.candidate.outputs.target_commitish }}" ]; then
            echo "release-stable already points to the eligible commit."
            exit 0
          fi

          git push origin "${{ steps.candidate.outputs.target_commitish }}:refs/heads/release-stable"
        env:
          GH_TOKEN: ${{ github.token }}
