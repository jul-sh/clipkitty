# cargo-deny configuration — supply-chain safety net
# https://embarkstudios.github.io/cargo-deny/

[advisories]
ignore = [
    # idna punycode issue — transitive dep via reqwest, no upgrade available yet
    { id = "RUSTSEC-2024-0421", reason = "transitive dep, awaiting upstream fix" },
    # proc-macro-error unmaintained — transitive dep via validator_derive
    { id = "RUSTSEC-2024-0370", reason = "transitive dep, no alternative yet" },
    # unic-* crates unmaintained — transitive deps via validator
    { id = "RUSTSEC-2025-0081", reason = "transitive dep via validator" },
    { id = "RUSTSEC-2025-0075", reason = "transitive dep via validator" },
    { id = "RUSTSEC-2025-0080", reason = "transitive dep via validator" },
    { id = "RUSTSEC-2025-0101", reason = "transitive dep via validator" },
    { id = "RUSTSEC-2025-0098", reason = "transitive dep via validator" },
]

[licenses]
allow = [
    "MIT",
    "Apache-2.0",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "BSL-1.0",
    "Zlib",
    "CC0-1.0",
    "OpenSSL",
    "CDLA-Permissive-2.0",
    "MPL-2.0",
]
confidence-threshold = 0.8

[licenses.private]
ignore = true

[bans]
multiple-versions = "warn"
wildcards = "allow"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
